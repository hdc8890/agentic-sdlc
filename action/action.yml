name: 'Agentic SDLC Validate'
description: 'Validates .agentic/ configuration files against the Agentic SDLC contracts. Use in CI to ensure repo profiles and policies stay well-formed after onboarding.'
author: 'agentic-sdlc'

inputs:
  config_dir:
    description: 'Path to the .agentic/ directory relative to the repo root'
    required: false
    default: '.agentic'

outputs:
  validation_passed:
    description: 'true if all .agentic/ files passed schema validation'

runs:
  using: 'node20'
  main: 'dist/index.js'

branding:
  icon: 'check-circle'
  color: 'blue'
